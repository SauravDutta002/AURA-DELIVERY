<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Delivery - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 28rem;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        AURA Delivery is temporarily unavailable because your device has no
        network connection. Reconnect to refresh live telemetry.
      </p>
    </main>
  </body>
</html>
